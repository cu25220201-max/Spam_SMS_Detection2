<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spam SMS Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; text-align: center; padding: 50px; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); display: inline-block; max-width: 500px; width: 100%; }
        textarea { width: 90%; height: 100px; padding: 10px; margin-bottom: 20px; border-radius: 5px; border: 1px solid #ccc; }
        input[type="submit"] { background: #007BFF; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        input[type="submit"]:hover { background: #0056b3; }
        .result { margin-top: 20px; font-weight: bold; font-size: 20px; }
        .spam { color: red; }
        .ham { color: green; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📩 Spam SMS Detection</h2>
        <form action="/predict" method="POST">
            <textarea name="message" placeholder="Paste your SMS here..." required>{{ original_text if original_text }}</textarea>
            <input type="submit" value="Check Message">
        </form>

        {% if prediction %}
            <div class="result">
                Result: <span class="{{ 'spam' if prediction == 'SPAM' else 'ham' }}">{{ prediction }}</span>
            </div>
        {% endif %}
    </div>
</body>
</html>
